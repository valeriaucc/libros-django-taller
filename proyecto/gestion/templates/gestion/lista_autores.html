<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Autores</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-5">

<h2 class="text-center mb-4">📚 Lista de Autores</h2>

<a href="{% url 'crear_autor' %}" class="btn btn-success mb-3">➕ Crear Autor</a>

<table class="table table-striped">
<thead class="table-dark">
<tr>
<th>Nombre</th>
<th>Correo</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>
{% for autor in autores %}
<tr>
<td>{{ autor.nombre }}</td>
<td>{{ autor.correo }}</td>
<td>
<a href="{% url 'editar_autor' autor.pk %}" class="btn btn-warning btn-sm">Editar</a>
<a href="{% url 'eliminar_autor' autor.pk %}" class="btn btn-danger btn-sm">Eliminar</a>
</td>
</tr>
{% endfor %}
</tbody>

</table>

</div>
</body>
</html>
