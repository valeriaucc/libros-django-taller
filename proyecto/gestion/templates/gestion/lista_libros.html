<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Libros</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-5">

<h2 class="text-center mb-4">📖 Lista de Libros</h2>

<a href="{% url 'crear_libro' %}" class="btn btn-success mb-3">➕ Crear Libro</a>

<table class="table table-striped">
<thead class="table-dark">
<tr>
<th>Título</th>
<th>Autor</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>
{% for libro in libros %}
<tr>
<td>{{ libro.titulo }}</td>
<td>{{ libro.autor.nombre }}</td>
<td>
<a href="{% url 'editar_libro' libro.pk %}" class="btn btn-warning btn-sm">Editar</a>
<a href="{% url 'eliminar_libro' libro.pk %}" class="btn btn-danger btn-sm">Eliminar</a>
</td>
</tr>
{% endfor %}
</tbody>

</table>

</div>
</body>
</html>
